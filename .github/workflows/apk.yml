name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Flutter project
        run: |
          set -e
          cp -a lib /tmp/cryptosage_lib
          cp pubspec.yaml /tmp/cryptosage_pubspec.yaml
          flutter create . --project-name cryptosage_lite --platforms=android
          rm -rf lib pubspec.yaml
          cp -a /tmp/cryptosage_lib ./lib
          cp /tmp/cryptosage_pubspec.yaml ./pubspec.yaml
          test -f lib/main.dart

      - name: Set Android NDK version
        run: |
          FILE_GRADLE=android/app/build.gradle
          FILE_KTS=android/app/build.gradle.kts
          if [ -f "$FILE_KTS" ]; then
            sed -i '0,/android {/s//android {\n    ndkVersion = "27.0.12077973"/' "$FILE_KTS"
          fi
          if [ -f "$FILE_GRADLE" ]; then
            sed -i '0,/android {/s//android {\n        ndkVersion "27.0.12077973"/' "$FILE_GRADLE"
          fi

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: cryptosage-ai-lite-apk
          path: build/app/outputs/flutter-apk/app-release.apk
