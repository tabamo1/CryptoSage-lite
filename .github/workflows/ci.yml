name: Validate Flutter Source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Flutter project
        run: |
          set -e
          cp -a lib /tmp/cryptosage_lib
          cp pubspec.yaml /tmp/cryptosage_pubspec.yaml
          if [ -d test ]; then
            cp -a test /tmp/cryptosage_test
          fi
          flutter create . --project-name cryptosage_lite --platforms=android
          rm -rf lib pubspec.yaml test
          cp -a /tmp/cryptosage_lib ./lib
          cp /tmp/cryptosage_pubspec.yaml ./pubspec.yaml
          if [ -d /tmp/cryptosage_test ]; then
            cp -a /tmp/cryptosage_test ./test
          fi
          test -f lib/main.dart

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory found; skipping tests."
          fi
